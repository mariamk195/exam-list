<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelf Exam Master Guide — April 27</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--card:#ffffff;--border:#e2e6ea;--text:#1a202c;--muted:#6b7280;
  --heme:#c0392b;--heme-bg:#fff5f5;--heme-light:#fecaca;
  --neuro:#6d28d9;--neuro-bg:#f5f3ff;--neuro-light:#ddd6fe;
  --em:#d97706;--em-bg:#fffbeb;--em-light:#fde68a;
  --icu:#1d4ed8;--icu-bg:#eff6ff;--icu-light:#bfdbfe;
  --peds:#059669;--peds-bg:#f0fdf4;--peds-light:#a7f3d0;
  --done-bg:#f0fdf4;--done-border:#86efac;
}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.header{background:#0f172a;color:#f1f5f9;padding:0;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.header-inner{padding:12px 20px 10px}
.header-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.exam-badge{background:#1e3a5f;border:1px solid #2563eb;color:#93c5fd;font-size:11px;padding:4px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace}
.overall-progress{background:#1e293b;border-radius:10px;padding:10px 14px;display:flex;gap:20px;align-items:center}
.ovr-label{font-size:11px;color:#94a3b8;white-space:nowrap}
.ovr-pct{font-size:24px;font-weight:700;color:#f8fafc;font-family:'IBM Plex Mono',monospace;min-width:52px}
.ovr-bar-wrap{flex:1}
.bar-track{background:#334155;border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#2563eb,#06b6d4);transition:width .5s ease}
.rot-bars{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.rot-mini{background:#1e293b;border-radius:6px;padding:6px 8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:all .2s}
.rot-mini:hover{background:#243552}
.rot-mini.active-tab{border-color:var(--accent,#2563eb)}
.rot-mini-label{font-size:9px;color:#94a3b8;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.rot-mini-pct{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.rot-mini-bar{height:3px;background:#334155;border-radius:2px;margin-top:4px;overflow:hidden}
.rot-mini-fill{height:100%;border-radius:2px;transition:width .5s}
.days-left{font-size:11px;color:#f59e0b;font-family:'IBM Plex Mono',monospace;margin-top:4px;text-align:right}
.panel-bar{background:#0f172a;border-bottom:1px solid #1e293b;padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap}
.panel-btn{background:transparent;border:1px solid #334155;color:#94a3b8;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:500;transition:all .2s;font-family:'IBM Plex Sans',sans-serif}
.panel-btn:hover,.panel-btn.active{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
.panel{display:none;background:#0f172a;border-bottom:2px solid #1e293b;padding:20px;color:#e2e8f0;animation:slideDown .25s ease}
.panel.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-top:12px}
.panel-card{background:#1e293b;border-radius:10px;padding:14px}
.panel-card h3{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.panel-card p,.panel-card li{font-size:12px;color:#94a3b8;line-height:1.7;margin-bottom:4px}
.panel-card ul{padding-left:14px}
.highlight{background:#1e3a5f;border-left:3px solid #3b82f6;padding:8px 12px;border-radius:0 6px 6px 0;margin:8px 0}
.highlight p{color:#bfdbfe!important}
.tip-box{background:#1c3a2a;border-left:3px solid #10b981;padding:8px 12px;border-radius:0 6px 6px 0;margin:8px 0}
.tip-box p{color:#a7f3d0!important}
.warn-box{background:#3a1c1c;border-left:3px solid #ef4444;padding:8px 12px;border-radius:0 6px 6px 0;margin:8px 0}
.warn-box p{color:#fca5a5!important}
.main{padding:16px 20px;max-width:980px;margin:0 auto}
.rot-header{border-radius:12px;padding:16px 18px;margin-bottom:14px;border-left:5px solid}
.rot-header-row{display:flex;justify-content:space-between;align-items:flex-start}
.rot-title{font-size:18px;font-weight:700}
.rot-sub{font-size:12px;margin-top:3px;color:#6b7280}
.rot-stats{text-align:right}
.rot-pct-big{font-size:28px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.rot-hours{font-size:11px;color:#6b7280;margin-top:2px}
.rot-bar-track{height:5px;background:#e2e8f0;border-radius:3px;margin-top:10px;overflow:hidden}
.rot-bar-fill{height:100%;border-radius:3px;transition:width .5s}
.topic-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;transition:border-color .2s,background .2s}
.topic-card.completed{background:var(--done-bg);border-color:var(--done-border)}
.topic-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.topic-header:hover{background:rgba(0,0,0,.02)}
.big-cb{width:24px;height:24px;border-radius:7px;border:2.5px solid #d1d5db;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:14px;transition:all .2s;background:white}
.big-cb.checked{background:#16a34a;border-color:#16a34a;color:white}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;line-height:1.4}
.added-badge{font-size:9px;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:3px;padding:1px 5px;white-space:nowrap}
.yield-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.topic-
